<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080">
  <defs>
    <radialGradient id="g" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="50%" stop-color="#0f2318"/>
      <stop offset="100%" stop-color="#071510"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="noisy"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)"/>
  <rect width="100%" height="100%" filter="url(#noise)" opacity="0.3"/>
  <!-- Subtle vignette -->
  <rect width="100%" height="100%" fill="transparent" rx="0" style="box-shadow: inset 0 0 200px rgba(0,0,0,0.5)"/>
  <ellipse cx="960" cy="486" rx="700" ry="450" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.06"/>
</svg>
